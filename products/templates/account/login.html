{% extends "base.html" %}
{% load socialaccount %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>Welcome Back</h1>
        <p>Sign in to continue building your dream PC.</p>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="login-btn">
                Sign In
            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <a href="{% provider_login_url 'google' %}" class="google-btn">
            Continue with Google
        </a>

        <p class="signup-text">
            Don't have an account?
            <a href="{% url 'account_signup' %}">
                Create one
            </a>
        </p>

    </div>

</div>

{% endblock %}

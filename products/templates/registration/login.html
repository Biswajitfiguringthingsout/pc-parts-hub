{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="login-wrapper">

    <div class="login-card">

        <h1>Welcome Back</h1>

        <p class="login-subtitle">
            Login to continue building your dream PC.
        </p>

        <form method="post">

            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="input-group">
                <label>Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

    </div>

</div>

{% endblock %}

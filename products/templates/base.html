<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <h1 class="logo">PC Parts Hub</h1>

    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/products/">Products</a>
        <a href="{% url 'build_page' %}">Builder</a>

        {% if user.is_authenticated %}
            <div class="user-menu">
                <span class="user-name">
                    👤 {{ user.username }}
                </span>

                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="nav-btn logout-btn">
                        Logout
                    </button>
                </form>
            </div>
        {% else %}
            <a href="{% url 'login' %}" class="nav-btn login-btn">
                Login
            </a>

            <a href="{% url 'register' %}" class="nav-btn">
                Register
            </a>
        {% endif %}

        <button id="theme-toggle" class="theme-switch">
            <span class="slider"></span>
        </button>
    </nav>

    {% block content %}
    {% endblock %}

    <script>
        const toggleBtn = document.getElementById("theme-toggle");

        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
        }

        toggleBtn.addEventListener("click", () => {

            document.body.classList.toggle("dark-mode");

            if (document.body.classList.contains("dark-mode")) {
                localStorage.setItem("theme", "dark");
            } else {
                localStorage.setItem("theme", "light");
            }
        });
    </script>

</body>
</html>
